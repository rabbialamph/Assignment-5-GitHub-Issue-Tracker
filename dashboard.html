<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
     <!-- google Geist font -->
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <!-- tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- style css -->
     <link rel="stylesheet" href="style.css">

    <title>GitHub Issues Tracker</title>
</head>
<body>

<header>
  <div class="navbar bg-base-100 shadow-sm flex flex-col md:flex-row md:justify-between gap-4 px-4 md:px-12 py-3">

    <div class="flex items-center gap-3">
      <img class="h-8 w-8 md:h-10 md:w-10" src="assets/github-logo.png" alt="">
      <h2 class="text-lg md:text-2xl font-semibold">GitHub Issues Tracker</h2>
    </div>

    <div class="flex sm:flex-row gap-3 w-full md:w-auto">
      <label class="input w-full sm:w-auto">
        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </g>
        </svg>
        <input id="searchInput" type="search" required placeholder="Search Issues" />
      </label>

      <button id="searchBtn" class="btn btn-primary sm:w-28">Search</button>
    </div>
  </div>
</header>

<section class="px-4 md:px-12">

  <div class="bg-base-100 shadow-sm mt-8 md:mt-12 p-4 md:p-5">
    <div id="statusBtn" class="flex flex-wrap gap-2 justify-center md:justify-start ">
      <button class="btn btn-primary w-24 sm:w-24 status-all">All</button>
      <button class="btn w-24 sm:w-24 status-open">Open</button>
      <button class="btn w-24 sm:w-24 status-closed">Closed</button>
    </div>
  </div>

  <div class="bg-base-100 shadow-sm mt-6 p-4 md:p-5 flex flex-col md:flex-row md:justify-between gap-4">

    <div class="flex items-center gap-2">
      <img class="bg-gray-100 rounded-full p-2" src="assets/Aperture.png" alt="">
      <div>
        <h2 id="issuesCount" class="font-semibold text-[16px] md:text-[18px]">0 Issues</h2>
        <p class="text-gray-500 text-sm md:text-base">Track and manage your project issues</p>
      </div>
    </div>

    <div class="flex items-center gap-6">
      <div class="flex items-center gap-2">
        <span class="bg-green-700 w-3 h-3 rounded-full inline-block"></span>
        <p class="font-medium">Open</p>
      </div>

      <div class="flex items-center gap-2">
        <span class="bg-purple-700 w-3 h-3 rounded-full inline-block"></span>
        <p class="font-medium">Closed</p>
      </div>
    </div>

  </div>
</section>

    <section class="px-4 md:px-12">
        <div class="bg-gray-50 shadow-sm border-t-2 border-gray-200 p-5 ">
            <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-4 gap-3">
                
            </div>
            
        </div>

    </section>

    <section>
      <!-- Open the modal using ID.showModal() method -->
          <dialog id="issuesModal" class="modal">
            <div class="modal-box">
                 <h2 id="modalTitle" class="font-semibold text-2xl"></h2>
                 <div class="flex items-center gap-2 mt-4">
                   <h2 id="modalStatus"></h2>
                   <span class="h-1.5 w-1.5 inline-block bg-gray-500 rounded-full"></span>
                   <p id="modalAuthor"></p>
                   <span class="h-1.5 w-1.5 inline-block bg-gray-500 rounded-full"></span>
                   <data id="modalDate"></data>
                 </div>
                 <div id="modalLabels" class="mt-7 flex gap-3">
                   
                  </div>
                   <p id="modalDescription" class="text-gray-500 mt-5 "></p>

                   <div class="grid grid-cols-2 bg-gray-100 rounded-[4px] p-5 mt-8">
                     <div class="space-y-1">
                      <p class="text-gray-500">Assignee:</p>
                      <h2 id="modalAuthorName" class="font-medium"></h2>
                    </div>
                    <div class="space-y-1">
                      <p class="text-gray-500">Priority:</p>
                      <h2 id="modalPriority" class="text-white bg-red-400 rounded-2xl p-1 w-20 text-center font-medium"></h2>
                    </div>
                   </div>
                  <div class="modal-action">
                  <form method="dialog">
                      <!-- if there is a button in form, it will close the modal -->
                       <button class="btn btn-primary">Close</button>
                  </form>
                  </div>
             </div>  
         </dialog>
    </section>

    <div id="loadSpinner" class="flex justify-center items-center h-[60vh] hidden">
      <span class="loading loading-bars loading-lg"></span>
    </div>


    <script src="dashboard.js"></script>
</body>
</html>
